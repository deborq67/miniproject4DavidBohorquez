<!-- templates/base.html -->
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>{% block title %}Organelle Search{% endblock %}</title>
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column;">
<header style="padding: 3vh 0; background-image: url(https://images.pexels.com/photos/10448365/pexels-photo-10448365.jpeg);">
    <div class="container px-lg-5">
        <div class="p-4 p-lg-5 rounded-3 text-center" style="background: linear-gradient(#e3b2f5, #1c4aa6);">
            <div class="m-4 m-lg-5">
                {% block header %}{% endblock %}
            </div>
        </div>
    </div>
</header>
<main style="flex: 1; padding: 3vh 0; background-image: url(https://images.pexels.com/photos/10448365/pexels-photo-10448365.jpeg);">
    <div class="container px-lg-5">
      <div class="p-4 p-lg-5 bg-light rounded-3 text-center" style="background: linear-gradient(#e3b2f5, #1c4aa6);">
          <div class="m-4 m-lg-5" style="min-height: 60vh">
            {% block content %}
            {% endblock %}
              <a class="btn btn-primary btn-lg" href="#!">Call to action</a></div>
      </div>
  </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
