{% extends 'base.html' %}

{% block content %}

<div class="container">
  <table class="table table-striped table-hover">
    <thead class="thead-dark">
      <tr>
        <th>Search Term</th>
        <th>Records Found</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      {% for query in history %}
      <tr>
        <td>{{ query.search_term }}</td>
        <td>{{ query.total_records }}</td>
        <td>{{ query.searched_at }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
